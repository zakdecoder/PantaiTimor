<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Profile - SLMS</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="../index.html" class="navbar-brand">SLMS - PantaiTimor</a>
    <ul class="navbar-nav">
      <li><a href="../index.html">Home</a></li>
      <li><a href="course-profile.html" class="active">Courses</a></li>
      <li><a href="student-profile.html">Students</a></li>
      <li><a href="enrolment.html">Enrolment</a></li>
    </ul>
  </nav>

  <div class="container">
    <h1 class="page-title">Course Profile Management</h1>

    <!-- ========== CREATE COURSE ========== -->
    <div class="card">
      <h2 class="card-title">Add New Course</h2>
      <div id="createMessage" class="message"></div>
      <form id="courseForm">
        <div class="form-row">
          <div class="form-group">
            <label for="courseName">Course Name (Full Name)</label>
            <input type="text" id="courseName" placeholder="e.g. Software Construction & Methods" required>
          </div>
          <div class="form-group">
            <label for="courseCode">Course Code</label>
            <input type="text" id="courseCode" placeholder="e.g. CSEB5223" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="creditHour">Credit Hour</label>
            <input type="number" id="creditHour" min="1" max="6" placeholder="e.g. 3" required>
          </div>
          <div class="form-group">
            <label for="msTeamsLink">MS Teams Link</label>
            <input type="url" id="msTeamsLink" placeholder="https://teams.microsoft.com/...">
          </div>
        </div>
        <div class="form-group">
          <label for="courseSummary">Course Summary</label>
          <textarea id="courseSummary" placeholder="Brief description of the course..." required></textarea>
        </div>
        <div class="btn-group">
          <button type="submit" class="btn btn-primary">Submit</button>
          <button type="reset" class="btn btn-secondary">Clear</button>
        </div>
      </form>
    </div>

    <!-- ========== SEARCH COURSE ========== -->
    <div class="card">
      <h2 class="card-title">Search Course</h2>
      <div id="searchMessage" class="message"></div>
      <form id="searchForm">
        <div class="search-bar">
          <div class="form-group">
            <label for="searchCode">Search by Course Code</label>
            <input type="text" id="searchCode" placeholder="e.g. CSEB5223">
          </div>
          <button type="submit" class="btn btn-primary">Search</button>
        </div>
      </form>
      <div id="searchResult" class="course-detail" style="margin-top: 16px;"></div>
    </div>

    <!-- ========== VIEW ALL COURSES ========== -->
    <div class="card">
      <h2 class="card-title">All Courses</h2>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Course Code</th>
              <th>Course Name</th>
              <th>Credit Hour</th>
              <th>Summary</th>
            </tr>
          </thead>
          <tbody id="courseTableBody">
            <tr>
              <td colspan="5" style="text-align: center; color: #888;">
                No courses added yet.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    SLMS - UNITEN
  </div>

  <script src="../assets/js/course-handler.js"></script>
</body>
</html>
